name: Deploy frontend app
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4

      # Explicitly set Node version (removes deprecation warnings)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t svalsang/react-test -f Dockerfile.dev .
      - run: docker run -e CI=true svalsang/react-test npm test
