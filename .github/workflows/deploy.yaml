name: Deploy frontend app

on:
  push:
    branches:
      - master  # or main, depending on your repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo (must come first!)
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Explicitly set Node version
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Step 3: Docker login
      - name: Docker login
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build Docker image
      - name: Build Docker image
        run: docker build -t svalsang/react-test -f Dockerfile.dev .

      # Step 5: Run tests inside container
      - name: Run tests
        run: docker run -e CI=true svalsang/react-test npm test
